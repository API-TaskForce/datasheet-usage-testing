services:
  prometheus:
    image: prom/prometheus:latest
    container_name: api-limiter-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: api-limiter-grafana
    ports:
      - '3001:3000' # Usamos 3001 para no chocar con tu backend (3000)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
